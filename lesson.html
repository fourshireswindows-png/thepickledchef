<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>Fillet & Bone | Culinary Masterclass Lesson</title>
<meta name="robots" content="noindex"/>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
:root{
  --bg:#0d1b2a;--bg2:#1a2e42;--bg3:#0a1520;--border:#2a3f55;
  --gold:#c9a84c;--gold2:#a8873a;--cream:#f0ece4;
  --text:#d4cfc7;--muted:#8a9bb0;--dark:#4a5a6a;
  --gold-light:rgba(201,168,76,0.08);
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;font-weight:300;overflow:hidden;}
body::before{content:'';position:fixed;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.025'/%3E%3C/svg%3E");pointer-events:none;z-index:0;}

/* SCREENS */
.screen{display:none;height:100vh;flex-direction:column;position:relative;z-index:1;}
.screen.active{display:flex;}

/* NAV */
nav{height:56px;display:flex;align-items:center;justify-content:space-between;padding:0 20px;background:rgba(13,27,42,0.97);backdrop-filter:blur(16px);border-bottom:1px solid var(--border);flex-shrink:0;}
.logo{text-decoration:none;display:flex;flex-direction:column;}
.logo-name{font-family:'Playfair Display',serif;font-size:14px;color:var(--cream);}
.logo-tag{font-size:8px;letter-spacing:0.12em;text-transform:uppercase;color:var(--gold);opacity:0.7;}
.nav-right{display:flex;align-items:center;gap:8px;}
.nav-btn{background:transparent;border:1px solid var(--border);padding:5px 11px;color:var(--muted);font-size:10px;font-family:'DM Sans',sans-serif;cursor:pointer;letter-spacing:0.05em;text-decoration:none;transition:all 0.2s;}
.nav-btn:hover{border-color:var(--gold);color:var(--gold);}

/* LESSON HEADER */
.lesson-header{background:var(--bg3);border-bottom:1px solid var(--border);padding:12px 20px;flex-shrink:0;}
.lesson-breadcrumb{font-size:10px;color:var(--dark);letter-spacing:0.05em;margin-bottom:4px;}
.lesson-breadcrumb a{color:var(--muted);text-decoration:none;}
.lesson-breadcrumb a:hover{color:var(--gold);}
.lesson-info{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;}
.lesson-title-wrap{display:flex;align-items:center;gap:10px;}
.lesson-num-badge{width:28px;height:28px;border-radius:50%;border:1px solid var(--gold);display:flex;align-items:center;justify-content:center;font-family:'Playfair Display',serif;font-size:11px;color:var(--gold);flex-shrink:0;}
.lesson-name{font-family:'Playfair Display',serif;font-size:16px;color:var(--cream);}
.lesson-course{font-size:10px;color:var(--muted);margin-top:2px;letter-spacing:0.04em;}
.lesson-progress{display:flex;align-items:center;gap:10px;}
.progress-dots{display:flex;gap:4px;}
.progress-dot{width:8px;height:8px;border-radius:50%;background:var(--border);transition:background 0.3s;}
.progress-dot.done{background:var(--gold);}
.progress-dot.current{background:var(--gold);opacity:0.5;}
.complete-btn{background:transparent;border:1px solid var(--gold);padding:6px 14px;color:var(--gold);font-size:10px;font-family:'DM Sans',sans-serif;cursor:pointer;letter-spacing:0.06em;text-transform:uppercase;transition:all 0.2s;}
.complete-btn:hover{background:var(--gold);color:var(--bg);}

/* LESSON INTRO SCREEN */
.intro-wrap{flex:1;display:flex;align-items:center;justify-content:center;padding:24px 20px;overflow-y:auto;}
.intro-card{width:100%;max-width:560px;}
.intro-rule{width:24px;height:1px;background:var(--gold);margin-bottom:16px;opacity:0.6;}
.intro-eyebrow{font-size:9px;letter-spacing:0.16em;text-transform:uppercase;color:var(--gold);margin-bottom:10px;opacity:0.8;}
.intro-title{font-family:'Playfair Display',serif;font-size:28px;color:var(--cream);margin-bottom:10px;line-height:1.2;}
.intro-chef{display:flex;align-items:center;gap:10px;margin-bottom:20px;padding:12px;background:var(--bg2);border:1px solid var(--border);}
.intro-chef-flag{font-size:24px;}
.intro-chef-name{font-family:'Playfair Display',serif;font-size:14px;color:var(--cream);}
.intro-chef-role{font-size:10px;color:var(--muted);letter-spacing:0.04em;}
.intro-objectives{margin-bottom:24px;}
.intro-objectives-title{font-size:10px;letter-spacing:0.1em;text-transform:uppercase;color:var(--gold);margin-bottom:10px;opacity:0.8;}
.objective{display:flex;align-items:flex-start;gap:8px;padding:8px 0;border-bottom:1px solid var(--border);font-size:13px;color:var(--muted);}
.objective:last-child{border-bottom:none;}
.objective-mark{color:var(--gold);flex-shrink:0;margin-top:1px;}
.intro-context{font-size:13px;color:var(--muted);line-height:1.7;margin-bottom:24px;padding:14px;background:var(--bg2);border:1px solid var(--border);border-left:2px solid var(--gold);}
.start-btn{width:100%;background:linear-gradient(135deg,var(--gold),var(--gold2));border:none;padding:13px;color:var(--bg);font-size:12px;font-family:'DM Sans',sans-serif;font-weight:500;cursor:pointer;letter-spacing:0.08em;text-transform:uppercase;transition:opacity 0.2s;}
.start-btn:hover{opacity:0.9;}
.free-notice{font-size:11px;color:var(--dark);text-align:center;margin-top:10px;letter-spacing:0.03em;}
.locked-notice{background:rgba(201,168,76,0.06);border:1px solid rgba(201,168,76,0.2);padding:14px;text-align:center;margin-top:16px;}
.locked-notice p{font-size:13px;color:var(--muted);margin-bottom:10px;}
.locked-notice a{display:inline-block;border:1px solid var(--gold);padding:8px 20px;color:var(--gold);font-size:11px;text-decoration:none;letter-spacing:0.06em;text-transform:uppercase;transition:all 0.2s;}
.locked-notice a:hover{background:var(--gold);color:var(--bg);}

/* CHAT */
.chat-main{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;}
.chat-thread{max-width:680px;margin:0 auto;padding:20px 16px;display:flex;flex-direction:column;gap:14px;}
.msg-row{display:flex;animation:fadeUp 0.3s ease both;}
.msg-row.user{justify-content:flex-end;}
.msg-row.assistant{justify-content:flex-start;align-items:flex-start;gap:9px;}
.msg-avatar{width:28px;height:28px;border-radius:50%;background:linear-gradient(135deg,var(--gold),var(--gold2));display:flex;align-items:center;justify-content:center;font-size:12px;color:var(--bg);flex-shrink:0;}
.msg-bubble{max-width:78%;padding:10px 14px;font-size:14px;line-height:1.7;font-weight:300;}
.msg-bubble.user{background:var(--bg2);color:var(--cream);border:1px solid var(--border);}
.msg-bubble.assistant{background:var(--gold-light);color:var(--text);border:1px solid rgba(201,168,76,0.15);}
.typing-bubble{background:var(--gold-light);border:1px solid rgba(201,168,76,0.15);padding:12px 16px;}
.typing-dots{display:flex;gap:4px;align-items:center;height:18px;}
.typing-dot{width:5px;height:5px;border-radius:50%;background:var(--gold);display:inline-block;animation:bounce 1.2s infinite ease-in-out;opacity:0.6;}

/* COMPLETE MODAL */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:200;align-items:center;justify-content:center;padding:20px;}
.modal-overlay.open{display:flex;}
.modal{background:var(--bg2);border:1px solid var(--border);padding:36px;width:100%;max-width:480px;}
.modal-rule{width:24px;height:1px;background:var(--gold);margin-bottom:16px;opacity:0.6;}
.modal-title{font-family:'Playfair Display',serif;font-size:22px;color:var(--cream);margin-bottom:16px;}
.modal-label{font-size:10px;letter-spacing:0.1em;text-transform:uppercase;color:var(--gold);margin-bottom:6px;opacity:0.8;display:block;margin-top:14px;}
.modal-textarea{width:100%;background:var(--bg);border:1px solid var(--border);padding:10px 13px;color:var(--cream);font-size:13px;font-family:'DM Sans',sans-serif;font-weight:300;resize:none;min-height:70px;transition:border-color 0.2s;}
.modal-textarea:focus{outline:none;border-color:var(--gold);}
.modal-textarea::placeholder{color:var(--dark);}
.rating-wrap{display:flex;gap:6px;margin-top:6px;}
.rating-btn{width:36px;height:36px;background:transparent;border:1px solid var(--border);color:var(--muted);font-size:14px;cursor:pointer;transition:all 0.2s;font-family:'DM Sans',sans-serif;}
.rating-btn:hover,.rating-btn.sel{background:var(--gold);border-color:var(--gold);color:var(--bg);}
.modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:20px;}
.modal-cancel{background:transparent;border:1px solid var(--border);padding:9px 16px;color:var(--muted);font-size:11px;font-family:'DM Sans',sans-serif;cursor:pointer;letter-spacing:0.05em;}
.modal-save{background:linear-gradient(135deg,var(--gold),var(--gold2));border:none;padding:9px 20px;color:var(--bg);font-size:11px;font-family:'DM Sans',sans-serif;font-weight:500;cursor:pointer;letter-spacing:0.06em;text-transform:uppercase;}

/* FOOTER */
.chat-footer{padding:8px 16px 14px;border-top:1px solid var(--border);background:rgba(13,27,42,0.97);backdrop-filter:blur(12px);flex-shrink:0;}
.input-wrap{max-width:680px;margin:0 auto;display:flex;align-items:center;gap:7px;background:var(--bg2);border:1px solid var(--border);padding:7px 7px 7px 14px;transition:border-color 0.3s;}
.input-wrap.listening{border-color:var(--gold);}
.chat-textarea{flex:1;background:transparent;border:none;color:var(--cream);font-size:14px;font-family:'DM Sans',sans-serif;font-weight:300;line-height:1.5;max-height:100px;resize:none;caret-color:var(--gold);}
.chat-textarea:focus{outline:none;}
.chat-textarea::placeholder{color:var(--dark);}
.mic-btn{width:34px;height:34px;background:transparent;border:1px solid var(--border);color:var(--muted);display:flex;align-items:center;justify-content:center;flex-shrink:0;cursor:pointer;transition:all 0.2s;}
.mic-btn:hover{border-color:var(--gold);color:var(--gold);}
.mic-btn.active{background:var(--gold);border-color:var(--gold);color:var(--bg);}
.send-btn{width:34px;height:34px;background:linear-gradient(135deg,var(--gold),var(--gold2));border:none;color:var(--bg);display:flex;align-items:center;justify-content:center;flex-shrink:0;cursor:pointer;transition:opacity 0.2s;}
.send-btn:disabled{opacity:0.35;cursor:default;}

@keyframes fadeUp{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}
@keyframes bounce{0%,80%,100%{transform:translateY(0);opacity:.4;}40%{transform:translateY(-5px);opacity:1;}}

@media(max-width:640px){
  .screen{height:100dvh;}
  nav{height:50px;padding:0 12px;}
  .logo-tag{display:none;}
  .lesson-header{padding:10px 12px;}
  .lesson-name{font-size:14px;}
  .intro-wrap{padding:16px;}
  .intro-title{font-size:22px;}
  .chat-thread{padding:12px;}
  .msg-bubble{max-width:88%;font-size:13px;}
  .chat-footer{padding:7px 12px 12px;}
  .chat-textarea{font-size:16px;}
}
</style>
</head>

</div>

// ── State ───────────────────────────────────────────────────────────────────
var params = new URLSearchParams(window.location.search);
var courseKey = params.get('course') || 'knife-skills';
var lessonNum = parseInt(params.get('lesson') || '1');
var isPremium = false;

// ── Init ────────────────────────────────────────────────────────────────────
window.onload = function() {
  supabase.auth.getSession().then(function(result) {
    if (!result.data.session) { window.location.href = 'auth.html'; return; }
    currentUser = result.data.session.user;

    // Load profile to check premium status
    supabase.from('profiles').select('*').eq('id', currentUser.id).single().then(function(r) {
      if (r.data) {
        userProfile = r.data;
        isPremium = r.data.is_premium || false;
      }
      loadLesson();
    });
  });
};

function loadLesson() {
  var course = COURSES[courseKey];
  if (!course) { window.location.href = 'courses.html'; return; }

  var lesson = course.lessons[lessonNum];
  if (!lesson) { window.location.href = 'courses.html'; return; }

  currentLesson = { course: course, lesson: lesson, lessonNum: lessonNum };

  // Check access
  var isFree = lessonNum === 1; // First lesson of every course is free
  var hasAccess = isFree || isPremium;

  // Build intro screen
  document.getElementById('breadcrumb-course').textContent = course.name;
  document.getElementById('intro-eyebrow').textContent = lesson.eyebrow;
  document.getElementById('intro-title').textContent = lesson.title;
  document.getElementById('intro-chef').innerHTML =
    '<div class="intro-chef-flag">' + course.flag + '</div>' +
    '<div><div class="intro-chef-name">' + course.chef + '</div>' +
    '<div class="intro-chef-role">' + course.chefRole + '</div></div>';

  // Objectives
  var objHtml = '<div class="intro-objectives-title">What you will learn</div>';
  lesson.objectives.forEach(function(obj) {
    objHtml += '<div class="objective"><span class="objective-mark">✦</span><span>' + escHtml(obj) + '</span></div>';
  });
  document.getElementById('intro-objectives').innerHTML = objHtml;
  document.getElementById('intro-context').textContent = lesson.context;

  // Progress dots
  var dots = '';
  for (var i = 1; i <= course.totalLessons; i++) {
    dots += '<div class="progress-dot' + (i < lessonNum ? ' done' : i === lessonNum ? ' current' : '') + '"></div>';
  }
  if (document.getElementById('progress-dots')) document.getElementById('progress-dots').innerHTML = dots;

  // Actions
  var actionsHtml = '';
  if (hasAccess) {
    actionsHtml = '<button class="start-btn" onclick="startLesson()">Begin lesson with ' + course.chef + ' →</button>';
    if (isFree && !isPremium && course.tier !== 'free') {
      actionsHtml += '<p class="free-notice">✦ First lesson free — <a href="upgrade.html" style="color:var(--gold)">upgrade to Academy</a> to continue</p>';
    }
  } else {
    actionsHtml = '<div class="locked-notice"><p>This lesson requires an Academy membership.</p><a href="upgrade.html">Unlock Academy — £9.99/month →</a></div>';
  }
  document.getElementById('intro-actions').innerHTML = actionsHtml;
}

function startLesson() {
  var course = currentLesson.course;
  var lesson = currentLesson.lesson;

  // Update lesson header
  document.getElementById('lesson-num-badge').textContent = lessonNum;
  document.getElementById('lesson-name-header').textContent = lesson.title;
  document.getElementById('lesson-course-header').textContent = course.course;

  // Update progress dots
  var dots = '';
  for (var i = 1; i <= course.totalLessons; i++) {
    dots += '<div class="progress-dot' + (i < lessonNum ? ' done' : i === lessonNum ? ' current' : '') + '"></div>';
  }
  document.getElementById('progress-dots').innerHTML = dots;

  // Switch screen
  showScreen('lesson');

  // Send opening message from chef
  var openingPrompt = buildOpeningPrompt();
  sendOpeningMessage(openingPrompt);
}

function buildOpeningPrompt() {
  var course = currentLesson.course;
  var lesson = currentLesson.lesson;
  var name = userProfile ? (userProfile.name || 'there') : 'there';
  var skill = userProfile ? (userProfile.skill_level || 'home cook') : 'home cook';

  return lesson.systemPrompt +
    '\n\nStudent information:\n' +
    '- Name: ' + name + '\n' +
    '- Skill level: ' + skill + '\n' +
    '- Allergies: ' + (userProfile && userProfile.allergies ? userProfile.allergies : 'None') + '\n\n' +
    'Begin the lesson now with a warm greeting. Introduce what you will be covering and ask an opening question to understand where they are starting from. Keep it concise — under 120 words for the opening.';
}

function sendOpeningMessage(prompt) {
  loading = true;
  renderMessages();

  fetch('/api/chat', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      model: 'claude-sonnet-4-6',
      max_tokens: 400,
      messages: [{ role: 'user', content: prompt }]
    })
  })
  .then(function(r) { return r.json(); })
  .then(function(data) {
    var reply = data.content && data.content[0] ? data.content[0].text : 'Hello — shall we begin?';
    messages.push({ role: 'assistant', content: reply });
    loading = false;
    renderMessages();
  })
  .catch(function() {
    var course = currentLesson.course;
    messages.push({ role: 'assistant', content: 'Welcome to today\'s lesson. I\'m ' + course.chef + ' and I\'m looking forward to working with you. Shall we begin?' });
    loading = false;
    renderMessages();
  });
}

// ── Chat ────────────────────────────────────────────────────────────────────
function sendMessage(textArg) {
  var t = (textArg || document.getElementById('chat-input').value).trim();
  if (!t || loading) return;

  document.getElementById('chat-input').value = '';
  document.getElementById('send-btn').disabled = true;
  autoResize(document.getElementById('chat-input'));

  messages.push({ role: 'user', content: t });
  loading = true;
  renderMessages();

  var systemPrompt = currentLesson.lesson.systemPrompt +
    '\n\nStudent: ' + (userProfile ? userProfile.name : 'Student') +
    '\nSkill level: ' + (userProfile ? userProfile.skill_level : 'home cook') +
    '\nAllergies: ' + (userProfile && userProfile.allergies ? userProfile.allergies : 'None') +
    '\n\nYou are mid-lesson. Continue naturally from the conversation. Keep responses focused on this lesson. Be warm, encouraging and precise.';

  fetch('/api/chat', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      model: 'claude-sonnet-4-6',
      max_tokens: 500,
      system: systemPrompt,
      messages: messages
    })
  })
  .then(function(r) { return r.json(); })
  .then(function(data) {
    var reply = data.content && data.content[0] ? data.content[0].text : 'Something went wrong.';
    messages.push({ role: 'assistant', content: reply });
    loading = false;
    renderMessages();
  })
  .catch(function() {
    messages.push({ role: 'assistant', content: 'Sorry, something went wrong. Please try again.' });
    loading = false;
    renderMessages();
  });
}

function renderMessages() {
  var thread = document.getElementById('chat-thread');
  var course = currentLesson ? currentLesson.course : null;
  var initial = course ? course.chef[0] : 'C';

  var html = messages.map(function(m) {
    var lines = m.content.split('\n').map(function(l) { return escHtml(l); }).join('<br>');
    if (m.role === 'user') {
      return '<div class="msg-row user"><div class="msg-bubble user">' + lines + '</div></div>';
    }
    return '<div class="msg-row assistant"><div class="msg-avatar">' + initial + '</div><div class="msg-bubble assistant">' + lines + '</div></div>';
  }).join('');

  if (loading) {
    html += '<div class="msg-row assistant"><div class="msg-avatar">' + initial + '</div><div class="typing-bubble"><div class="typing-dots"><div class="typing-dot" style="animation-delay:0ms"></div><div class="typing-dot" style="animation-delay:150ms"></div><div class="typing-dot" style="animation-delay:300ms"></div></div></div></div>';
  }

  thread.innerHTML = html;
  var main = document.getElementById('chat-main');
  if (main) main.scrollTop = main.scrollHeight;
}

// ── Complete lesson ─────────────────────────────────────────────────────────
function openCompleteModal() {
  document.getElementById('modal-overlay').classList.add('open');
}

function closeModal() {
  document.getElementById('modal-overlay').classList.remove('open');
}

function setRating(val, btn) {
  selectedRating = val;
  document.querySelectorAll('.rating-btn').forEach(function(b) { b.classList.remove('sel'); });
  btn.classList.add('sel');
}

function completeLesson() {
  if (!currentUser || !currentLesson) return;

  var wentWell = document.getElementById('went-well').value;
  var needsWork = document.getElementById('needs-work').value;
  var courseName = currentLesson.course.name;
  var chefName = currentLesson.course.chef;

  // Get current module count BEFORE saving (for promotion check)
  supabase.from('profiles').select('completed_modules').eq('id', currentUser.id).single().then(function(profileResult) {
    var prevCount = (profileResult.data && profileResult.data.completed_modules) || 0;

    // Use upsert with unique constraint — prevents duplicate completions
    supabase.from('course_progress').upsert({
      user_id: currentUser.id,
      course_name: courseName,
      chef_name: chefName,
      lesson_number: lessonNum,
      lesson_title: currentLesson.lesson.title,
      lesson_notes: messages.map(function(m) { return m.role + ': ' + m.content; }).join('\n\n').slice(0, 2000),
      what_went_well: wentWell,
      needs_work: needsWork,
      rating: selectedRating || null
    }, { onConflict: 'user_id,course_name,lesson_number' }).then(function(result) {
      closeModal();

      // Recalculate module count from course_progress (source of truth)
      supabase.from('course_progress').select('id', { count: 'exact' }).eq('user_id', currentUser.id).then(function(countResult) {
        var newCount = countResult.count || 0;

        // Update profiles.completed_modules
        supabase.from('profiles').update({ completed_modules: newCount }).eq('id', currentUser.id);

        // Check for rank promotion
        var promotion = checkPromotion(prevCount, newCount);
        if (promotion) {
          var rankInfo = getUserChefRank(newCount);
          showPromotionToast(promotion, rankInfo.icon);
        }

        // Check if all lessons complete
        var totalLessons = currentLesson.course.totalLessons;
        if (lessonNum >= totalLessons) {
          generateCertificate(courseName, chefName);
        } else {
          var nextLesson = lessonNum + 1;
          // Delay navigation if promotion toast is showing
          setTimeout(function() {
            window.location.href = 'lesson.html?course=' + courseKey + '&lesson=' + nextLesson;
          }, promotion ? 2000 : 0);
        }
      });
    });
  });
}

function generateCertificate(courseName, chefName) {
  // Save certificate to Supabase
  var certId = 'FB-' + Date.now() + '-' + Math.random().toString(36).substr(2, 6).toUpperCase();
  var studentName = userProfile ? userProfile.name : 'Student';

  supabase.from('certificates').insert({
    id: certId,
    user_id: currentUser.id,
    student_name: studentName,
    course_name: courseName,
    chef_name: chefName,
    issued_at: new Date().toISOString()
  }).then(function() {
    window.location.href = 'certificate.html?id=' + certId;
  }).catch(function() {
    // Certificate table might not exist yet — just go back to courses
    window.location.href = 'courses.html?completed=' + encodeURIComponent(courseName);
  });
}

// ── Voice ───────────────────────────────────────────────────────────────────
function toggleListen() {
  var SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) { alert('Voice input works best in Chrome or Safari.'); return; }
  if (listening) { recognition && recognition.stop(); return; }
  recognition = new SR();
  recognition.lang = 'en-GB';
  recognition.continuous = false;
  recognition.interimResults = false;
  recognition.onstart = function() {
    listening = true;
    document.getElementById('mic-btn').classList.add('active');
    document.getElementById('input-wrap').classList.add('listening');
    document.getElementById('chat-input').placeholder = 'Listening…';
  };
  recognition.onresult = function(e) {
    var t = e.results[0][0].transcript;
    document.getElementById('chat-input').value = t;
    document.getElementById('send-btn').disabled = !t.trim();
    autoResize(document.getElementById('chat-input'));
  };
  recognition.onerror = recognition.onend = function() {
    listening = false;
    document.getElementById('mic-btn').classList.remove('active');
    document.getElementById('input-wrap').classList.remove('listening');
    document.getElementById('chat-input').placeholder = 'Ask your chef anything about this lesson…';
  };
  recognition.start();
}

// ── Helpers ─────────────────────────────────────────────────────────────────
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(function(s) { s.classList.remove('active'); });
  document.getElementById('screen-' + id).classList.add('active');
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 100) + 'px';
  document.getElementById('send-btn').disabled = !el.value.trim();
}

function escHtml(s) {
  return String(s || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

document.getElementById('modal-overlay').addEventListener('click', function(e) {
  if (e.target === this) closeModal();
});
</script>
