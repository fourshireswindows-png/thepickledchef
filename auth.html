<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>The Pickled Chef — Sign Up</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{
  --bg:#f7f9fc;--bg2:#ffffff;--border:#dde8f5;
  --amber:#c8873a;--amber2:#a06828;
  --sky:#4a9edd;--sky2:#2980b9;
  --navy:#1a2340;--sky-light:#e8f2fb;
  --text:#2a3040;--muted:#6b7a8d;--dark:#9aa3b0;
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;background:var(--bg);}
body{font-family:'DM Sans',sans-serif;font-weight:300;color:var(--text);}

nav{height:58px;display:flex;align-items:center;justify-content:space-between;padding:0 20px;background:rgba(247,249,252,0.97);backdrop-filter:blur(16px);border-bottom:1px solid var(--border);box-shadow:0 1px 8px rgba(74,158,221,0.06);}
.logo{display:flex;align-items:center;gap:7px;text-decoration:none;}
.logo-mark{color:var(--amber);font-size:13px;}
.logo-text{font-family:'Playfair Display',serif;font-size:16px;color:var(--navy);}
.nav-btn{background:transparent;border:1px solid var(--border);border-radius:8px;padding:5px 12px;color:var(--muted);font-size:11px;font-family:'DM Sans',sans-serif;cursor:pointer;text-decoration:none;transition:all 0.2s;}
.nav-btn:hover{border-color:var(--sky);color:var(--sky);}

.wrap{min-height:calc(100vh - 58px);display:flex;align-items:center;justify-content:center;padding:32px 20px;}
.card{width:100%;max-width:420px;background:white;border:1.5px solid var(--border);border-radius:20px;padding:40px 36px;box-shadow:0 4px 24px rgba(74,158,221,0.08);}

.card-eyebrow{font-size:10px;letter-spacing:0.12em;text-transform:uppercase;color:var(--sky);margin-bottom:10px;}
.card-title{font-family:'Playfair Display',serif;font-size:28px;font-weight:400;color:var(--navy);margin-bottom:6px;}
.card-sub{font-size:13px;color:var(--muted);margin-bottom:28px;line-height:1.6;}

.tabs{display:flex;gap:0;margin-bottom:28px;background:var(--bg);border-radius:10px;padding:3px;}
.tab{flex:1;padding:9px;text-align:center;font-size:13px;font-family:'DM Sans',sans-serif;cursor:pointer;border-radius:8px;border:none;background:transparent;color:var(--muted);transition:all 0.2s;}
.tab.active{background:white;color:var(--sky);font-weight:500;box-shadow:0 1px 6px rgba(0,0,0,0.08);}

.form-group{margin-bottom:16px;}
.form-label{font-size:12px;color:var(--muted);margin-bottom:6px;display:block;font-weight:400;}
.form-input{width:100%;background:var(--bg);border:1.5px solid var(--border);border-radius:10px;padding:12px 14px;color:var(--text);font-size:15px;font-family:'DM Sans',sans-serif;font-weight:300;transition:border-color 0.2s;}
.form-input:focus{outline:none;border-color:var(--sky);background:white;}

.btn-sky{width:100%;background:linear-gradient(135deg,var(--sky),var(--sky2));border:none;border-radius:11px;padding:14px;color:white;font-size:14px;font-family:'DM Sans',sans-serif;font-weight:500;cursor:pointer;margin-top:8px;box-shadow:0 4px 14px rgba(74,158,221,0.2);transition:transform 0.2s;}
.btn-sky:hover{transform:translateY(-1px);}
.btn-sky:disabled{opacity:0.5;cursor:default;transform:none;}

.divider{display:flex;align-items:center;gap:12px;margin:20px 0;}
.divider-line{flex:1;height:1px;background:var(--border);}
.divider-text{font-size:12px;color:var(--dark);}

.btn-google{width:100%;background:white;border:1.5px solid var(--border);border-radius:11px;padding:13px;color:var(--text);font-size:14px;font-family:'DM Sans',sans-serif;font-weight:400;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:10px;transition:border-color 0.2s,box-shadow 0.2s;}
.btn-google:hover{border-color:var(--sky);box-shadow:0 2px 8px rgba(74,158,221,0.1);}

.error-msg{background:#fef0ef;border:1px solid #fad4d0;border-radius:8px;padding:10px 14px;font-size:13px;color:#c0392b;margin-bottom:16px;display:none;}
.success-msg{background:rgba(74,158,221,0.08);border:1px solid rgba(74,158,221,0.3);border-radius:8px;padding:10px 14px;font-size:13px;color:var(--sky);margin-bottom:16px;display:none;}

.terms{font-size:11px;color:var(--dark);text-align:center;margin-top:16px;line-height:1.6;}
.terms a{color:var(--sky);text-decoration:none;}

@media(max-width:480px){
  .card{padding:28px 20px;border-radius:16px;}
  .card-title{font-size:24px;}
}
</style>
</head>
<body>

<nav>
  <a href="index.html" class="logo">
    <span class="logo-mark">✦</span>
    <span class="logo-text">The Pickled Chef</span>
  </a>
  <a href="index.html" class="nav-btn">← Home</a>
</nav>

<div class="wrap">
  <div class="card">
    <div class="card-eyebrow">Welcome to The Pickled Chef</div>
    <h1 class="card-title">Join the kitchen.</h1>
    <p class="card-sub">Free forever. No ads. No card required.</p>

    <div class="tabs">
      <button class="tab active" onclick="switchTab('signup')">Create account</button>
      <button class="tab" onclick="switchTab('login')">Sign in</button>
    </div>

    <div id="error-msg" class="error-msg"></div>
    <div id="success-msg" class="success-msg"></div>

    <!-- Signup form -->
    <div id="signup-form">
      <div class="form-group">
        <label class="form-label">Your name</label>
        <input type="text" id="signup-name" class="form-input" placeholder="First name"/>
      </div>
      <div class="form-group">
        <label class="form-label">Email address</label>
        <input type="email" id="signup-email" class="form-input" placeholder="your@email.com"/>
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <input type="password" id="signup-password" class="form-input" placeholder="At least 8 characters"/>
      </div>
      <button class="btn-sky" id="signup-btn" onclick="handleSignup()">Create my account</button>
      <div class="divider">
        <div class="divider-line"></div>
        <span class="divider-text">or</span>
        <div class="divider-line"></div>
      </div>
      <button class="btn-google" onclick="handleGoogle()">
        <svg width="18" height="18" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
        Continue with Google
      </button>
      <p class="terms">By creating an account you agree to our <a href="#">Terms</a> and <a href="#">Privacy Policy</a>. No ads. No data selling.</p>
    </div>

    <!-- Login form -->
    <div id="login-form" style="display:none">
      <div class="form-group">
        <label class="form-label">Email address</label>
        <input type="email" id="login-email" class="form-input" placeholder="your@email.com"/>
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <input type="password" id="login-password" class="form-input" placeholder="Your password"/>
      </div>
      <button class="btn-sky" id="login-btn" onclick="handleLogin()">Sign in</button>
      <div class="divider">
        <div class="divider-line"></div>
        <span class="divider-text">or</span>
        <div class="divider-line"></div>
      </div>
      <button class="btn-google" onclick="handleGoogle()">
        <svg width="18" height="18" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
        Continue with Google
      </button>
      <p style="text-align:center;font-size:12px;color:var(--muted);margin-top:16px;">
        <a href="#" onclick="forgotPassword()" style="color:var(--sky);text-decoration:none;">Forgot your password?</a>
      </p>
    </div>
  </div>
</div>

<script>
// ── Supabase init ─────────────────────────────────────────────────────────────
var SUPABASE_URL = 'https://eoznfympnigexjkcnkck.supabase.co';
var SUPABASE_KEY = 'sb_publishable_t3UbxPmTr7GRAtfTawNatQ_Y_30u-Re';
var supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

// Check if already logged in
supabase.auth.getSession().then(function(result) {
  if (result.data.session) {
    window.location.href = 'chat.html';
  }
});

function switchTab(tab) {
  document.querySelectorAll('.tab').forEach(function(t) { t.classList.remove('active'); });
  event.target.classList.add('active');
  document.getElementById('signup-form').style.display = tab === 'signup' ? 'block' : 'none';
  document.getElementById('login-form').style.display = tab === 'login' ? 'block' : 'none';
  hideMessages();
}

function showError(msg) {
  var el = document.getElementById('error-msg');
  el.textContent = msg;
  el.style.display = 'block';
  document.getElementById('success-msg').style.display = 'none';
}

function showSuccess(msg) {
  var el = document.getElementById('success-msg');
  el.textContent = msg;
  el.style.display = 'block';
  document.getElementById('error-msg').style.display = 'none';
}

function hideMessages() {
  document.getElementById('error-msg').style.display = 'none';
  document.getElementById('success-msg').style.display = 'none';
}

function handleSignup() {
  var name = document.getElementById('signup-name').value.trim();
  var email = document.getElementById('signup-email').value.trim();
  var password = document.getElementById('signup-password').value;

  if (!name) { showError('Please enter your name.'); return; }
  if (!email || !email.includes('@')) { showError('Please enter a valid email.'); return; }
  if (password.length < 8) { showError('Password must be at least 8 characters.'); return; }

  var btn = document.getElementById('signup-btn');
  btn.disabled = true;
  btn.textContent = 'Creating account…';

  supabase.auth.signUp({
    email: email,
    password: password,
    options: { data: { name: name } }
  }).then(function(result) {
    if (result.error) {
      showError(result.error.message);
      btn.disabled = false;
      btn.textContent = 'Create my account';
    } else {
      // Save name to localStorage for profile setup
      localStorage.setItem('pc_signup_name', name);
      showSuccess('Account created! Check your email to verify then sign in.');
      btn.disabled = false;
      btn.textContent = 'Create my account';
    }
  });
}

function handleLogin() {
  var email = document.getElementById('login-email').value.trim();
  var password = document.getElementById('login-password').value;

  if (!email || !email.includes('@')) { showError('Please enter a valid email.'); return; }
  if (!password) { showError('Please enter your password.'); return; }

  var btn = document.getElementById('login-btn');
  btn.disabled = true;
  btn.textContent = 'Signing in…';

  supabase.auth.signInWithPassword({
    email: email,
    password: password
  }).then(function(result) {
    if (result.error) {
      showError(result.error.message);
      btn.disabled = false;
      btn.textContent = 'Sign in';
    } else {
      window.location.href = 'chat.html';
    }
  });
}

function handleGoogle() {
  supabase.auth.signInWithOAuth({
    provider: 'google',
    options: { redirectTo: window.location.origin + '/chat.html' }
  });
}

function forgotPassword() {
  var email = document.getElementById('login-email').value.trim();
  if (!email || !email.includes('@')) {
    showError('Enter your email address above first.');
    return;
  }
  supabase.auth.resetPasswordForEmail(email, {
    redirectTo: window.location.origin + '/chat.html'
  }).then(function(result) {
    if (result.error) showError(result.error.message);
    else showSuccess('Password reset email sent. Check your inbox.');
  });
}

// Enter key support
document.addEventListener('keydown', function(e) {
  if (e.key === 'Enter') {
    if (document.getElementById('signup-form').style.display !== 'none') handleSignup();
    else handleLogin();
  }
});
</script>
</body>
</html>
