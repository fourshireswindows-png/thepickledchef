<!DOCTYPE html>
<html lang="en">
<head>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{--bg:#0d1b2a;--bg2:#1a2e42;--border:#2a3f55;--gold:#c9a84c;--gold2:#a8873a;--sky:#4a9edd;--cream:#f0ece4;--text:#d4cfc7;--muted:#8a9bb0;--dark:#4a5a6a;}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;background:var(--bg);}
body{font-family:'DM Sans',sans-serif;font-weight:300;color:var(--text);}
body::before{content:'';position:fixed;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.025'/%3E%3C/svg%3E");pointer-events:none;z-index:0;}
nav{height:60px;display:flex;align-items:center;justify-content:space-between;padding:0 32px;border-bottom:1px solid var(--border);position:relative;z-index:1;}
.logo{text-decoration:none;}
.logo-name{font-family:'Playfair Display',serif;font-size:17px;color:var(--cream);display:block;}
.logo-tag{font-size:9px;letter-spacing:0.16em;text-transform:uppercase;color:var(--gold);opacity:0.7;}
.nav-back{color:var(--muted);font-size:12px;text-decoration:none;letter-spacing:0.04em;transition:color 0.2s;}
.nav-back:hover{color:var(--gold);}
.wrap{min-height:calc(100vh - 60px);display:flex;align-items:center;justify-content:center;padding:40px 20px;position:relative;z-index:1;}
.card{width:100%;max-width:420px;background:var(--bg2);border:1px solid var(--border);padding:44px 40px;}
.card-rule{width:32px;height:1px;background:var(--gold);margin-bottom:20px;opacity:0.6;}
.card-eyebrow{font-size:10px;letter-spacing:0.16em;text-transform:uppercase;color:var(--gold);margin-bottom:10px;opacity:0.8;}
.card-title{font-family:'Playfair Display',serif;font-size:26px;color:var(--cream);margin-bottom:6px;}
.card-sub{font-size:13px;color:var(--muted);margin-bottom:28px;line-height:1.6;}
.tabs{display:flex;gap:0;margin-bottom:28px;border-bottom:1px solid var(--border);}
.tab{flex:1;padding:10px;text-align:center;font-size:12px;font-family:'DM Sans',sans-serif;cursor:pointer;border:none;background:transparent;color:var(--dark);letter-spacing:0.06em;text-transform:uppercase;transition:all 0.2s;border-bottom:1px solid transparent;margin-bottom:-1px;}
.tab.active{color:var(--gold);border-bottom-color:var(--gold);}
.form-group{margin-bottom:16px;}
.form-label{font-size:11px;color:var(--muted);margin-bottom:6px;display:block;letter-spacing:0.06em;text-transform:uppercase;}
.form-input{width:100%;background:var(--bg);border:1px solid var(--border);padding:12px 14px;color:var(--cream);font-size:14px;font-family:'DM Sans',sans-serif;font-weight:300;transition:border-color 0.2s;}
.form-input:focus{outline:none;border-color:var(--gold);}
.form-input::placeholder{color:var(--dark);}
.btn-gold{width:100%;background:linear-gradient(135deg,var(--gold),var(--gold2));border:none;padding:13px;color:var(--bg);font-size:12px;font-family:'DM Sans',sans-serif;font-weight:500;cursor:pointer;margin-top:8px;letter-spacing:0.08em;text-transform:uppercase;transition:opacity 0.2s;}
.btn-gold:disabled{opacity:0.4;cursor:default;}
.divider{display:flex;align-items:center;gap:12px;margin:20px 0;}
.divider-line{flex:1;height:1px;background:var(--border);}
.divider-text{font-size:11px;color:var(--dark);letter-spacing:0.06em;}
.btn-google{width:100%;background:transparent;border:1px solid var(--border);padding:12px;color:var(--text);font-size:13px;font-family:'DM Sans',sans-serif;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:10px;transition:border-color 0.2s;}
.btn-google:hover{border-color:var(--gold);}
.error-msg{background:rgba(192,57,43,0.1);border:1px solid rgba(192,57,43,0.3);padding:10px 14px;font-size:12px;color:#e74c3c;margin-bottom:16px;display:none;}
.success-msg{background:rgba(201,168,76,0.08);border:1px solid rgba(201,168,76,0.3);padding:10px 14px;font-size:12px;color:var(--gold);margin-bottom:16px;display:none;}
.terms{font-size:11px;color:var(--dark);text-align:center;margin-top:16px;line-height:1.6;letter-spacing:0.02em;}
.terms a{color:var(--gold);text-decoration:none;}
.forgot{text-align:center;font-size:12px;margin-top:14px;}
.forgot a{color:var(--muted);text-decoration:none;letter-spacing:0.04em;transition:color 0.2s;}
.forgot a:hover{color:var(--gold);}
@media(max-width:480px){.card{padding:28px 20px;}.nav{padding:0 16px;}}
</style>
</head>
<body>
<nav>
  <a href="index.html" class="logo">
    <span class="logo-name">Fillet & Bone</span>
    <span class="logo-tag">A Culinary Masterclass</span>
  </a>
  <a href="index.html" class="nav-back">← Back</a>
</nav>
<div class="wrap">
  <div class="card">
    <div class="card-rule"></div>
    <p class="card-eyebrow">Fillet & Bone</p>
    <h1 class="card-title">Join the school.</h1>
    <p class="card-sub">Free forever. No ads. No card required.</p>
    <div class="tabs">
      <button class="tab active" onclick="switchTab('signup',this)">Create Account</button>
      <button class="tab" onclick="switchTab('login',this)">Sign In</button>
    </div>
    <div id="error-msg" class="error-msg"></div>
    <div id="success-msg" class="success-msg"></div>
    <div id="signup-form">
      <div class="form-group">
        <label class="form-label">Your name</label>
        <input type="text" id="signup-name" class="form-input" placeholder="First name"/>
      </div>
      <div class="form-group">
        <label class="form-label">Email address</label>
        <input type="email" id="signup-email" class="form-input" placeholder="your@email.com"/>
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <input type="password" id="signup-password" class="form-input" placeholder="At least 8 characters"/>
      </div>
      <button class="btn-gold" id="signup-btn" onclick="handleSignup()">Create Account</button>
      <div class="divider"><div class="divider-line"></div><span class="divider-text">or</span><div class="divider-line"></div></div>
      <button class="btn-google" onclick="handleGoogle()">
        <svg width="16" height="16" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
        Continue with Google
      </button>
      <p class="terms">By enrolling you agree to our <a href="#">Terms</a> and <a href="#">Privacy Policy</a>.<br>No ads. No data selling. Ever.</p>
    </div>
    <div id="login-form" style="display:none">
      <div class="form-group">
        <label class="form-label">Email address</label>
        <input type="email" id="login-email" class="form-input" placeholder="your@email.com"/>
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <input type="password" id="login-password" class="form-input" placeholder="Your password"/>
      </div>
      <button class="btn-gold" id="login-btn" onclick="handleLogin()">Sign In</button>
      <div class="divider"><div class="divider-line"></div><span class="divider-text">or</span><div class="divider-line"></div></div>
      <button class="btn-google" onclick="handleGoogle()">
        <svg width="16" height="16" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
        Continue with Google
      </button>
      <div class="forgot"><a href="#" onclick="forgotPassword()">Forgot your password?</a></div>
    </div>
  </div>
</div>
<script>
var SUPABASE_URL='https://ctlwnlxifaibyezrvlau.supabase.co';
var SUPABASE_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImN0bHdubHhpZmFpYnllenJ2bGF1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY4NzA4MjgsImV4cCI6MjA5MjQ0NjgyOH0.xEQ0bW0y09LkH_zTho06-hcWBjfHLQ0ADTirGgBoDDs';
var supabase=window.supabase.createClient(SUPABASE_URL,SUPABASE_KEY);
supabase.auth.getSession().then(function(r){if(r.data.session)window.location.href='chat.html';});
function switchTab(tab,btn){document.querySelectorAll('.tab').forEach(function(t){t.classList.remove('active');});btn.classList.add('active');document.getElementById('signup-form').style.display=tab==='signup'?'block':'none';document.getElementById('login-form').style.display=tab==='login'?'block':'none';hideMessages();}
function showError(msg){var el=document.getElementById('error-msg');el.textContent=msg;el.style.display='block';document.getElementById('success-msg').style.display='none';}
function showSuccess(msg){var el=document.getElementById('success-msg');el.textContent=msg;el.style.display='block';document.getElementById('error-msg').style.display='none';}
function hideMessages(){document.getElementById('error-msg').style.display='none';document.getElementById('success-msg').style.display='none';}
function handleSignup(){
  var name=document.getElementById('signup-name').value.trim();
  var email=document.getElementById('signup-email').value.trim();
  var password=document.getElementById('signup-password').value;
  if(!name){showError('Please enter your name.');return;}
  if(!email||!email.includes('@')){showError('Please enter a valid email.');return;}
  if(password.length<8){showError('Password must be at least 8 characters.');return;}
  var btn=document.getElementById('signup-btn');btn.disabled=true;btn.textContent='Creating account…';
  supabase.auth.signUp({email:email,password:password,options:{data:{name:name}}}).then(function(r){
    if(r.error){showError(r.error.message);btn.disabled=false;btn.textContent='Create Account';}
    else{localStorage.setItem('fb_signup_name',name);showSuccess('Account created! Check your email to verify then sign in.');;btn.disabled=false;btn.textContent='Create Account';}
  });
}
function handleLogin(){
  var email=document.getElementById('login-email').value.trim();
  var password=document.getElementById('login-password').value;
  if(!email||!email.includes('@')){showError('Please enter a valid email.');return;}
  if(!password){showError('Please enter your password.');return;}
  var btn=document.getElementById('login-btn');btn.disabled=true;btn.textContent='Signing in…';
  supabase.auth.signInWithPassword({email:email,password:password}).then(function(r){
    if(r.error){showError(r.error.message);btn.disabled=false;btn.textContent='Sign In';}
    else window.location.href='chat.html';
  });
}
function handleGoogle(){supabase.auth.signInWithOAuth({provider:'google',options:{redirectTo:window.location.origin+'/chat.html'}});}
function forgotPassword(){
  var email=document.getElementById('login-email').value.trim();
  if(!email||!email.includes('@')){showError('Enter your email above first.');return;}
  supabase.auth.resetPasswordForEmail(email,{redirectTo:window.location.origin+'/chat.html'}).then(function(r){
    if(r.error)showError(r.error.message);else showSuccess('Password reset email sent.');
  });
}
document.addEventListener('keydown',function(e){if(e.key==='Enter'){if(document.getElementById('signup-form').style.display!=='none')handleSignup();else handleLogin();}});
</script>
</body>
</html>
